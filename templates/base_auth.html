<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 MyDividends</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .auth-card h1 { font-size: 28px; margin-bottom: 8px; }
        .auth-card .subtitle { color: #999; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; color: #666; margin-bottom: 4px; }
        .form-group input {
            width: 100%; padding: 12px 14px; border-radius: 12px;
            border: 1.5px solid #e0e0e0; font-size: 15px; transition: border 0.2s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; font-size: 16px; font-weight: 700; cursor: pointer;
            margin-top: 8px; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .link { color: #667eea; text-decoration: none; font-size: 14px; margin-top: 16px; display: block; }
        .link:hover { text-decoration: underline; }
        .flash-error { background: #ffeaea; color: #c62828; padding: 10px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; }
        .flash-success { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; }
        .emoji { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="auth-card">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
